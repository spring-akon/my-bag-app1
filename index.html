<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BAG SCANNER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .ios-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .active-scale:active { transform: scale(0.97); }
    </style>
</head>
<body class="text-white">
    <div class="min-h-screen flex flex-col px-6 py-10 max-w-md mx-auto">
        
        <header class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-[2rem] flex items-center justify-center mx-auto shadow-2xl mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
            </div>
            <h1 class="text-3xl font-black tracking-tighter italic italic uppercase">Sora <span class="text-blue-500">Sync</span></h1>
            <p class="text-[9px] text-slate-500 font-bold tracking-[0.4em] uppercase mt-2">v103 Field Alignment</p>
        </header>

        <div class="flex-1 space-y-6">
            <!-- 欄位提醒 -->
            <div class="bg-blue-500/10 border border-blue-500/20 rounded-2xl p-4 flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider leading-tight">
                    此版本發送欄位為 <span class="text-white underline">data0</span>，請確保 n8n Analyze 節點設定一致。
                </p>
            </div>

            <div id="dropzone" class="aspect-square ios-card rounded-[3rem] flex flex-col items-center justify-center overflow-hidden active-scale transition-all border-dashed border-2 border-white/5">
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                <img id="preview" class="hidden w-full h-full object-contain p-4">
                <div id="placeholder" class="text-center opacity-20">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="mx-auto mb-3"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                    <p class="text-[10px] font-black uppercase tracking-[0.2em]">點擊開啟相機 / 相簿</p>
                </div>
            </div>

            <button id="sendBtn" class="w-full py-7 bg-blue-600 active:bg-blue-500 disabled:opacity-20 text-white rounded-[2rem] font-black text-xl shadow-2xl flex flex-col items-center justify-center transition-all active-scale">
                <span id="btnText" class="uppercase tracking-[0.2em]">發送數據</span>
            </button>
        </div>

        <footer class="mt-8 text-center py-4">
            <p class="text-[9px] font-bold text-slate-700 uppercase tracking-widest leading-loose">
                Ready for tomorrow's quota reset
            </p>
        </footer>

        <div id="toast" class="fixed bottom-10 left-6 right-6 translate-y-40 transition-all duration-500">
            <div class="ios-card bg-emerald-900/40 border-emerald-500/20 rounded-[2rem] p-6 flex items-center gap-4 shadow-2xl">
                <div class="w-12 h-12 bg-emerald-600 rounded-full flex items-center justify-center text-white shrink-0 shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                </div>
                <div>
                    <h4 class="text-emerald-400 font-black uppercase text-sm italic">傳輸擊穿</h4>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">請檢查電腦 n8n 執行進度</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const preview = document.getElementById('preview');
        const placeholder = document.getElementById('placeholder');
        const sendBtn = document.getElementById('sendBtn');
        const toast = document.getElementById('toast');
        const btnText = document.getElementById('btnText');

        dropzone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    preview.src = event.target.result;
                    preview.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        sendBtn.onclick = async () => {
            if (!fileInput.files[0]) return;
            btnText.innerText = "傳輸中...";
            sendBtn.disabled = true;

            const formData = new FormData();
            // 對齊 n8n 截圖中的 data0
            formData.append('DATA0', fileInput.files[0]);

            try {
                await fetch('https://n8n-vvbymzka.ap-northeast-1.clawcloudrun.com/webhook-test/sora-gen', {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });

                toast.classList.remove('translate-y-40');
                setTimeout(() => {
                    toast.classList.add('translate-y-40');
                    btnText.innerText = "發送數據";
                    sendBtn.disabled = false;
                    resetApp();
                }, 3000);
            } catch (err) {
                alert('連線失敗');
                sendBtn.disabled = false;
                btnText.innerText = "發送數據";
            }
        };

        function resetApp() {
            preview.classList.add('hidden');
            placeholder.classList.remove('hidden');
            fileInput.value = '';
        }
    </script>
</body>
</html>
